name: Watch Workday companies for cyber internships

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Workday watcher
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python workday_watcher.py

      - name: Commit updated seen_workday.json
        run: |
          git config user.name "cyber-internship-watcher-bot"
          git config user.email "actions@github.com"
          git add seen_workday.json
          git diff --staged --quiet || git commit -m "Update seen Workday postings [skip ci]"
          git push
