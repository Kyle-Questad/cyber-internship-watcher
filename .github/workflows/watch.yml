name: Watch for cyber internships

on:
  schedule:
    # Every 30 minutes. GitHub may delay this slightly during busy periods,
    # but it's the closest free option to real-time.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write  # needed so the workflow can commit seen.json back

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: python watcher.py

      - name: Commit updated seen.json
        run: |
          git config user.name "cyber-internship-watcher-bot"
          git config user.email "actions@github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "Update seen postings [skip ci]"
          git push
